services:
  db:
    image: postgres:15
    container_name: link_shortener_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=shortener_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: link_shortener_app
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/shortener_db
      - BASE_URL=http://localhost:8080/r/
    depends_on:
      - db

volumes:
  postgres_data: